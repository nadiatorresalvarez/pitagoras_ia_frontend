name: pitagoras_ia
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.8.0
  flutter_secure_storage: ^9.2.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true

  assets:
    - lib/assets/images/mascot/
    - lib/assets/images/auth/
    - lib/assets/images/icons/

  fonts:
    - family: Poppins
      fonts:
        - asset: lib/assets/fonts/poppins.regular.ttf
        - asset: lib/assets/fonts/poppins.medium.ttf
          weight: 500
        - asset: lib/assets/fonts/poppins.semibold.ttf
          weight: 600
        - asset: lib/assets/fonts/poppins.bold.ttf
          weight: 700
